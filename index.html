<!DOCTYPE html>
<html lang                              = "en">
<head>
  <meta charset                         = "UTF-8">
  <meta name                            = "viewport" content="width=device-width, initial-scale=1.0">
  <title>LocalShore - Instant Delivery in 60min</title>
  <link href                            = "https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Poppins:wght@400;500;600&family=Inter:wght@400;500&family=Rubik:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --orange                          : #FF6B1A;--orange-deep:#E05500;--navy:#1A3380;
      --text-head                       : #111827;--text-body:#374151;--text-muted:#6B7280;--text-hint:#9CA3AF;
      --border                          : #E5E7EB;--bg:#F9FAFB;--white:#FFFFFF;
      --shadow-sm                       : 0 1px 4px rgba(0,0,0,0.06);
      --shadow-card                     : 0 24px 64px rgba(26,51,128,0.10),0 4px 16px rgba(0,0,0,0.06);
    }
    html,body{min-height                : 100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text-body);overflow-y:auto;}
    .bg-wrap{position                   : fixed;inset:0;z-index:0;background:linear-gradient(145deg,#ffffff 0%,#f0f4ff 45%,#fff6f0 100%);overflow:hidden;}
    .bg-blob{position                   : absolute;border-radius:50%;filter:blur(90px);opacity:0.18;animation:blobDrift linear infinite;}
    .blob-1{width                       : 640px;height:640px;background:var(--orange);top:-220px;right:-180px;animation-duration:28s;}
    .blob-2{width                       : 560px;height:560px;background:var(--navy);bottom:-200px;left:-140px;animation-duration:34s;animation-delay:-12s;}
    .blob-3{width                       : 320px;height:320px;background:#FF9A5C;bottom:12%;right:8%;animation-duration:22s;animation-delay:-6s;opacity:0.10;}
    @keyframes blobDrift{0%{transform   : translate(0,0) scale(1);}33%{transform:translate(28px,18px) scale(1.03);}66%{transform:translate(-18px,30px) scale(0.97);}100%{transform:translate(0,0) scale(1);}}
    .page{position                      : relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px;}
    /* Brand */
    .brand{text-align                   : center;margin-bottom:24px;animation:fadeDown 0.65s cubic-bezier(0.22,1,0.36,1) both;}
    .logo-ring{width                    : 108px;height:108px;border-radius:50%;background:var(--white);box-shadow:0 0 0 4px rgba(255,107,26,0.12),0 8px 32px rgba(255,107,26,0.18);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;overflow:hidden;animation:logoPop 0.75s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;}
    .logo-ring img{width                : 92px;height:92px;object-fit:contain;border-radius:50%;}
    @keyframes logoPop{from{opacity     : 0;transform:scale(0.55);}to{opacity:1;transform:scale(1);}}
    .brand-name{font-family             : 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;font-size:28px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;}
    .brand-name span{color              : var(--orange);}
    .brand-tagline{font-family          : 'Rubik',sans-serif;font-size:12px;font-weight:400;color:var(--text-muted);letter-spacing:0.14em;text-transform:uppercase;margin-top:5px;}
    /* Detecting bar */
    .detecting-bar{display              : flex;align-items:center;gap:8px;background:rgba(255,107,26,0.07);border:1px solid rgba(255,107,26,0.18);border-radius:100px;padding:7px 18px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--orange);margin-bottom:14px;animation:fadeUp 0.5s ease both;}
    .detecting-dot{width                : 7px;height:7px;border-radius:50%;background:var(--orange);animation:ping 1.4s ease-in-out infinite;}
    @keyframes ping{0%,100%{transform   : scale(1);opacity:1;}50%{transform:scale(1.6);opacity:0.5;}}
    /* Toggle */
    .toggle-btn{display                 : inline-flex;align-items:center;gap:10px;padding:13px 36px;border-radius:100px;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.02em;cursor:pointer;border:none;background:linear-gradient(135deg,var(--orange) 0%,var(--orange-deep) 100%);color:#fff;box-shadow:0 6px 24px rgba(255,107,26,0.38);transition:transform 0.2s,box-shadow 0.2s;animation:fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s both;}
    .toggle-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,107,26,0.46);}
    .toggle-btn .arrow{font-size        : 12px;transition:transform 0.3s;display:inline-block;}
    .toggle-btn.open .arrow{transform   : rotate(180deg);}
    /* Card */
    .card-wrapper{width                 : 100%;max-width:420px;overflow:hidden;max-height:0;transition:max-height 0.6s cubic-bezier(0.4,0,0.2,1),opacity 0.4s,transform 0.4s;opacity:0;transform:translateY(-10px);}
    .card-wrapper.open{max-height       : 720px;opacity:1;transform:translateY(0);}
    .card{margin-top                    : 16px;background:var(--white);border:1px solid var(--border);border-radius:20px;padding:32px 28px 28px;box-shadow:var(--shadow-card);}
    /* Tabs */
    .tabs{display                       : flex;background:#F3F4F6;border-radius:10px;padding:4px;margin-bottom:26px;gap:4px;}
    .tab{flex                           : 1;padding:10px;text-align:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.03em;cursor:pointer;border-radius:7px;color:var(--text-muted);transition:all 0.22s;user-select:none;}
    .tab.active{background              : var(--navy);color:#fff;box-shadow:0 2px 12px rgba(26,51,128,0.28);}
    .panel{display                      : none;}.panel.active{display:block;}
    /* Fields */
    .field{margin-bottom                : 16px;position:relative;}
    label{display                       : block;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text-body);letter-spacing:0.07em;text-transform:uppercase;margin-bottom:7px;}
    .input-wrap{position                : relative;display:flex;align-items:center;}
    .input-icon{position                : absolute;left:13px;font-size:15px;pointer-events:none;opacity:0.38;}
    .autofill-badge{position            : absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);border-radius:6px;padding:2px 8px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:#059669;letter-spacing:0.04em;opacity:0;transition:opacity 0.3s;pointer-events:none;}
    .autofill-badge.show{opacity        : 1;}
    input[type                          = "text"],input[type="email"],input[type="password"],input[type="tel"]{width:100%;padding:12px 14px 12px 40px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text-head);font-family:'Inter',sans-serif;font-size:14px;font-weight:400;outline:none;transition:border-color 0.2s,box-shadow 0.2s,background 0.2s;}
    input:focus{border-color:var(--orange);background:var(--white);box-shadow:0 0 0 3px rgba(255,107,26,0.12);}
    input::placeholder{color:var(--text-hint);font-family:'Inter',sans-serif;font-weight:400;}
    input                               : -webkit-autofill{-webkit-box-shadow:0 0 0 30px var(--white) inset !important;-webkit-text-fill-color:var(--text-head) !important;border-color:rgba(16,185,129,0.35) !important;}
    .hint{font-family                   : 'Rubik',sans-serif;font-size:11px;font-weight:400;color:var(--text-hint);margin-top:5px;line-height:1.4;}
    /* Button */
    .submit-btn{width                   : 100%;margin-top:6px;padding:13px 20px;border:none;border-radius:10px;cursor:pointer;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.02em;color:#fff;background:linear-gradient(135deg,var(--orange) 0%,var(--orange-deep) 100%);box-shadow:0 4px 18px rgba(255,107,26,0.32);transition:transform 0.18s,box-shadow 0.18s,opacity 0.18s;}
    .submit-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 26px rgba(255,107,26,0.42);}
    .submit-btn:disabled{opacity:0.52;cursor:not-allowed;transform:none;}
    /* Badges */
    .badges{display                     : flex;gap:10px;justify-content:center;margin-top:26px;flex-wrap:wrap;animation:fadeUp 0.8s ease 0.5s both;}
    .badge{display                      : flex;align-items:center;gap:6px;padding:7px 14px;border-radius:100px;border:1px solid var(--border);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;color:var(--text-muted);background:var(--white);box-shadow:var(--shadow-sm);}
    .badge-dot{width                    : 6px;height:6px;border-radius:50%;flex-shrink:0;}
    .bd-orange{background               : var(--orange);box-shadow:0 0 6px rgba(255,107,26,0.5);}
    .bd-navy{background                 : var(--navy);box-shadow:0 0 6px rgba(26,51,128,0.45);}
    .bd-green{background                : #10B981;box-shadow:0 0 6px rgba(16,185,129,0.5);}
    /* Toast */
    .toast{position                     : fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 24px;border-radius:100px;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;background:#111827;color:#fff;border:1px solid rgba(255,255,255,0.08);opacity:0;transition:opacity 0.3s,transform 0.3s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 8px 28px rgba(0,0,0,0.22);}
    .toast.show{opacity                 : 1;transform:translateX(-50%) translateY(0);}
    .toast.error{background             : #7f1d1d;border-color:rgba(255,100,100,0.25);}
    /* Redirect overlay */
    .redirect-overlay{display           : none;position:fixed;inset:0;z-index:200;background:rgba(249,250,251,0.96);backdrop-filter:blur(8px);flex-direction:column;align-items:center;justify-content:center;gap:16px;}
    .redirect-overlay.show{display      : flex;}
    .redirect-spinner{width             : 44px;height:44px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
    .redirect-msg{font-family           : 'Poppins',sans-serif;font-size:15px;font-weight:600;color:var(--navy);}
    .redirect-sub{font-family           : 'Inter',sans-serif;font-size:13px;color:var(--text-muted);}
    @keyframes spin{to{transform        : rotate(360deg);}}
    @keyframes fadeDown{from{opacity    : 0;transform:translateY(-22px);}to{opacity:1;transform:none;}}
    @keyframes fadeUp{from{opacity      : 0;transform:translateY(18px);}to{opacity:1;transform:none;}}
  </style>
</head>

</div>

        <div class                      = "field">
          <label>Mobile Number</label>
          <div class                    = "input-wrap">
            <span class                 = "input-icon">&#128241;</span>
            <input type                 = "tel" id="signupMobile" name="tel" autocomplete="tel"
                   placeholder          = "+91 XXXXX XXXXX" maxlength="15" oninput="showBadge('signupMobileBadge')">
          </div>
          <span class                   = "autofill-badge" id="signupMobileBadge">Auto-filled</span>
          <div class                    = "hint">Used for order updates &amp; delivery alerts</div>
        </div>
        <div class                      = "field">
          <label>Password</label>
          <div class                    = "input-wrap">
            <span class                 = "input-icon">&#128274;</span>
            <input type                 = "password" id="signupPassword" name="new-password"
                   autocomplete         = "new-password" placeholder="Minimum 6 characters">
          </div>
        </div>
        <button class                   = "submit-btn" id="signupBtn" onclick="handleSignup()">Create My Account</button>
      </div>
    </div>
  </div>

  <div class                            = "badges">
    <div class                          = "badge"><span class="badge-dot bd-green"></span>Every Need</div>
    <div class                          = "badge"><span class="badge-dot bd-orange"></span>60-Min Delivery</div>
    <div class                          = "badge"><span class="badge-dot bd-navy"></span>100% Secure</div>
  </div>
</div>

<div id                                 = "toast" class="toast"></div>

<script>
  function toggleCard(){
    const w                             = document.getElementById('cardWrapper'),b=document.getElementById('toggleBtn');
    const open                          = w.classList.toggle('open');b.classList.toggle('open',open);
  }
  function switchTab(tab){
    ['Login','Signup'].forEach(t=>{
      document.getElementById('tab'+t).classList.toggle('active',t.toLowerCase()===tab);
      document.getElementById('panel'+t).classList.toggle('active',t.toLowerCase()===tab);
    });
  }
  function showBadge(id){
    const el                            = document.getElementById(id);
    if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2500);}
  }
  window.addEventListener('DOMContentLoaded',()=>{
    setTimeout(()=>{
      if(document.getElementById('loginEmail')?.value)    showBadge('loginEmailBadge');
      if(document.getElementById('loginPassword')?.value) showBadge('loginPassBadge');
    },800);
  });
</script>

<script type                            = "module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAnalytics }  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
  import {
    getAuth,signInWithEmailAndPassword,
    createUserWithEmailAndPassword,onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig={
    apiKey                              : "AIzaSyD3bMVjeXXAYvCeUgvhlT_KrHuhpgohqgU",
    authDomain                          : "localshore.firebaseapp.com",
    projectId                           : "localshore",
    storageBucket                       : "localshore.firebasestorage.app",
    messagingSenderId                   : "571613573322",
    appId                               : "1:571613573322:web:231c155de7d8227e0e8433",
    measurementId                       : "G-V097GP4PF2"
  };

  const app                             = initializeApp(firebaseConfig);
  const analytics                       = getAnalytics(app);
  const auth                            = getAuth(app);
  window.auth                           = auth;

  onAuthStateChanged(auth,(user)=>{
    const bar                           = document.getElementById('detectingBar');
    if(user){
      document.getElementById('redirectSub').textContent='Signed in as '+(user.email||'User')+'. Taking you to your dashboard...';
      document.getElementById('redirectOverlay').classList.add('show');
      setTimeout(()=>{window.location.href='home.html';},2000);
    } else {
      if(bar){bar.style.transition='opacity 0.4s';bar.style.opacity='0';setTimeout(()=>bar.style.display='none',400);}
      setTimeout(()=>{
        document.getElementById('cardWrapper').classList.add('open');
        document.getElementById('toggleBtn').classList.add('open');
      },500);
    }
  });

  function showToast(msg,type="success"){
    const t                             = document.getElementById("toast");
    t.textContent                       = msg;t.className="toast "+type+" show";
    clearTimeout(t._t);t._t             = setTimeout(()=>t.classList.remove("show"),4000);
  }
  function setBtn(id,loading,label){
    const el                            = document.getElementById(id);if(!el)return;
    el.disabled                         = loading;el.textContent=loading?"Please wait...":label;
  }
  function friendlyError(code){
    const m={
      "auth/user-not-found":"No account found with this email.",
      "auth/wrong-password":"Incorrect password. Please try again.",
      "auth/invalid-credential":"Invalid email or password.",
      "auth/email-already-in-use":"An account with this email already exists.",
      "auth/weak-password":"Password must be at least 6 characters.",
      "auth/invalid-email":"Please enter a valid email address.",
      "auth/too-many-requests":"Too many attempts. Try again later.",
      "auth/network-request-failed":"Network error. Check your connection."
    };
    return m[code]||"Something went wrong ("+(code||"unknown")+").";
  }

  window.handleLogin=async function(){
    const email                         = document.getElementById("loginEmail").value.trim();
    const password                      = document.getElementById("loginPassword").value;
    if(!email||!password){showToast("Please fill in all fields","error");return;}
    setBtn("loginBtn",true,"Login to LocalShore");
    try{
      await signInWithEmailAndPassword(auth,email,password);
      showToast("Welcome back! Redirecting...");
      setTimeout(()=>{window.location.href="home.html";},1500);
    }catch(err){showToast(friendlyError(err.code),"error");}
    finally{setBtn("loginBtn",false,"Login to LocalShore");}
  };

  window.handleSignup=async function(){
    const name                          = document.getElementById("signupName").value.trim();
    const email                         = document.getElementById("signupEmail").value.trim();
    const mobile                        = document.getElementById("signupMobile").value.trim();
    const password                      = document.getElementById("signupPassword").value;
    if(!name||!email||!mobile||!password){showToast("Please fill in all fields","error");return;}
    if(password.length<6){showToast("Password needs at least 6 characters","error");return;}
    setBtn("signupBtn",true,"Create My Account");
    try{
      await createUserWithEmailAndPassword(auth,email,password);
      showToast("Welcome to LocalShore, "+name+"! Redirecting...");
      setTimeout(()=>{window.location.href="home.html";},1500);
    }catch(err){showToast(friendlyError(err.code),"error");}
    finally{setBtn("signupBtn",false,"Create My Account");}
  };
</script>
</body>
</html>
